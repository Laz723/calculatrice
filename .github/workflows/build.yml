# ============================================================
#  Fabrique les 3 setups (Windows / macOS / Linux) + Release,
#  AVEC ton icone personnalisee (convertie automatiquement).
#
#  -> Mets ton icone en PNG carre nomme  icon.png  a la racine du repo
#     (idealement 512x512 ou 1024x1024). Le workflow s'occupe du reste.
#  -> A placer dans :  .github/workflows/build.yml  (remplace l'ancien)
# ============================================================

name: Build setups (Windows / macOS / Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Numero de version (ex: v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  APP_NAME: Calculatrice          # le nom de ton appli
  ENTRY: python/calculatrice.py   # chemin "prefere" (sinon il cherche tout seul)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trouver le fichier Python a compiler
        id: find
        run: |
          if [ -f "$ENTRY" ]; then
            FOUND="$ENTRY"
          else
            FOUND=$(grep -rlE "mainloop\(|__main__" --include="*.py" . 2>/dev/null \
                    | grep -v '/.git/' | head -1 | sed 's|^\./||')
          fi
          if [ "${{ runner.os }}" = "Linux" ]; then
            {
              echo "## Diagnostic du build"
              echo ""
              echo "**Fichiers presents dans ton repo :**"
              echo '```'
              find . -type f -not -path './.git/*' | sed 's|^\./||' | sort
              echo '```'
              if [ -n "$FOUND" ]; then
                echo "OK - compilation de : \`$FOUND\`"
                if [ -f icon.png ]; then echo "OK - icone perso trouvee : \`icon.png\`"; else echo "Info - pas de \`icon.png\` (icone par defaut utilisee)"; fi
              else
                echo "### ERREUR - Aucun fichier Python a compiler"
                echo "-> Verifie que ton .py est bien commite et pousse dans ce repo."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -z "$FOUND" ]; then echo "::error::Aucun fichier Python trouve."; exit 1; fi
          echo "entry=$FOUND" >> "$GITHUB_OUTPUT"
          echo "Fichier a compiler : $FOUND"

      - name: Preparer l'icone (si icon.png present)
        run: |
          ICON_FLAG=""
          if [ -f icon.png ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              pip install --quiet pillow
              python -c "from PIL import Image; im=Image.open('icon.png').convert('RGBA'); im.save('icon.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"
              ICON_FLAG="--icon icon.ico"
            elif [ "${{ runner.os }}" = "macOS" ]; then
              mkdir -p icon.iconset
              for pair in "16 16x16" "32 16x16@2x" "32 32x32" "64 32x32@2x" "128 128x128" "256 128x128@2x" "256 256x256" "512 256x256@2x" "512 512x512" "1024 512x512@2x"; do
                set -- $pair
                sips -z "$1" "$1" icon.png --out "icon.iconset/icon_$2.png" >/dev/null
              done
              iconutil -c icns icon.iconset -o icon.icns
              ICON_FLAG="--icon icon.icns"
            fi
          fi
          echo "ICON_FLAG=$ICON_FLAG" >> "$GITHUB_ENV"
          echo "Icone -> ${ICON_FLAG:-aucune (defaut)}"

      - name: (Linux) installer Tkinter
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          REQ="$(dirname "${{ steps.find.outputs.entry }}")/requirements.txt"
          if [ -f "$REQ" ]; then
            grep -viE '^[[:space:]]*tkinter[[:space:]]*$' "$REQ" > _req.txt || true
            [ -s _req.txt ] && pip install -r _req.txt || true
          fi

      - name: Compiler avec PyInstaller
        run: |
          pyinstaller --onefile --windowed $ICON_FLAG \
            --paths "$(dirname "${{ steps.find.outputs.entry }}")" \
            --name "$APP_NAME" "${{ steps.find.outputs.entry }}"

      - name: (Windows) preparer le .exe
        if: runner.os == 'Windows'
        run: mv "dist/$APP_NAME.exe" "dist/$APP_NAME-Windows.exe"

      - name: (Linux) preparer le .tar.gz
        if: runner.os == 'Linux'
        run: tar -czf "dist/$APP_NAME-Linux.tar.gz" -C dist "$APP_NAME"

      - name: (macOS) preparer le .dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg && cp -R "dist/$APP_NAME.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "$APP_NAME" -srcfolder dmg -ov -format UDZO "dist/$APP_NAME-macOS.dmg"

      - name: Mettre de cote le fichier compile
        uses: actions/upload-artifact@v4
        with:
          name: setup-${{ runner.os }}
          path: |
            dist/*-Windows.exe
            dist/*-Linux.tar.gz
            dist/*-macOS.dmg
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Determiner le numero de version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Recuperer les fichiers
        uses: actions/download-artifact@v4
        with:
          path: setups
          merge-multiple: true

      - name: Publier la Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.ver.outputs.tag }}
          files: setups/*
